<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>She Can Foundation</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#f3e5f5,#ce93d8,#ba68c8);
      padding:20px;
    }

    .container{
      background:white;
      width:100%;
      max-width:420px;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      text-align:center;
      margin-bottom:10px;
    }

    .logo i{
      font-size:50px;
      color:#8e24aa;
    }

    h1{
      text-align:center;
      color:#6a1b9a;
      margin-bottom:8px;
      font-size:28px;
    }

    .subtitle{
      text-align:center;
      color:#777;
      margin-bottom:25px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:18px;
    }

    input,
    textarea{
      width:100%;
      padding:14px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
      font-size:14px;
      transition:0.3s;
    }

    input:focus,
    textarea:focus{
      border-color:#8e24aa;
      box-shadow:0 0 8px rgba(142,36,170,0.2);
    }

    textarea{
      resize:none;
      height:110px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#8e24aa;
      color:white;
      font-size:16px;
      font-weight:500;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#6a1b9a;
      transform:scale(1.02);
    }

    #successMessage{
      text-align:center;
      margin-top:18px;
      color:green;
      font-weight:600;
    }

    .footer{
      text-align:center;
      margin-top:25px;
      color:#777;
      font-size:13px;
    }

    .social-icons{
      margin-top:12px;
    }

    .social-icons i{
      margin:0 8px;
      color:#8e24aa;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .social-icons i:hover{
      transform:translateY(-3px);
    }

    @media(max-width:500px){

      .container{
        padding:25px;
      }

      h1{
        font-size:24px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <i class="fa-solid fa-hand-holding-heart"></i>
    </div>

    <h1>She Can Foundation</h1>

    <p class="subtitle">
      Empowering women through technology and opportunities
    </p>

    <form id="contactForm">

      <div class="input-group">
        <input type="text" placeholder="Enter Your Name" required>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Enter Your Email" required>
      </div>

      <div class="input-group">
        <textarea placeholder="Enter Your Message" required></textarea>
      </div>

      <button type="submit">Submit</button>

      <p id="successMessage"></p>

    </form>

    <div class="footer">

      <p>Connect With Us</p>

      <div class="social-icons">
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-twitter"></i>
      </div>

    </div>

  </div>

  <script>

    document.getElementById("contactForm")
    .addEventListener("submit", function(event){

      event.preventDefault();

      document.getElementById("successMessage")
      .innerText = "Form Submitted Successfully";

      this.reset();

    });

  </script>

</body>
</html>
